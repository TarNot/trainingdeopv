<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps & Cloud Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0e1a;
    color: #e2e8f0;
    font-family: 'JetBrains Mono', monospace;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0e1a; }
  ::-webkit-scrollbar-thumb { background: #00ff88; border-radius: 2px; }

  .header {
    background: linear-gradient(135deg, #0d1220 0%, #0a1628 50%, #0d1a12 100%);
    border-bottom: 1px solid rgba(0,255,136,0.15);
    padding: 36px 32px 28px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-meta { display: flex; align-items: center; gap: 10; margin-bottom: 8px; }
  .header-meta span { font-size: 12px; letter-spacing: 3px; }
  .label-green { color: #00ff88; }
  .label-dim { color: #475569; }
  .cursor { color: #00ff88; animation: pulse 1s infinite; margin-left: 6px; }
  h1 { font-family: 'Syne', sans-serif; font-size: clamp(22px,4vw,38px); font-weight: 800; color: #f1f5f9; letter-spacing: -1px; margin-bottom: 20px; }
  h1 span { color: #00ff88; }

  .progress-bar-wrap { display: flex; align-items: center; gap: 14px; }
  .progress-track { flex: 1; height: 6px; background: #1e2a3a; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #00cfff); border-radius: 3px; transition: width 0.5s ease; box-shadow: 0 0 10px #00ff88; }
  .progress-pct { color: #00ff88; font-size: 13px; font-weight: 600; min-width: 40px; }
  .progress-label { color: #475569; font-size: 11px; }

  .main { max-width: 900px; margin: 0 auto; padding: 28px 20px 40px; }

  .phase-card {
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    overflow: hidden;
    background: #0d1220;
    margin-bottom: 10px;
    transition: border-color 0.3s, transform 0.2s;
  }
  .phase-card:hover { transform: translateX(3px); }
  .phase-card.open { background: #0d1420; }

  .phase-header {
    padding: 16px 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    user-select: none;
  }
  .phase-icon {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .phase-meta { flex: 1; min-width: 0; }
  .phase-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
  .phase-num { font-size: 10px; font-weight: 600; letter-spacing: 2px; }
  .phase-badge {
    border-radius: 4px; padding: 1px 8px; font-size: 10px;
    border: 1px solid; font-family: 'JetBrains Mono', monospace;
  }
  .done-label { color: #00ff88; font-size: 11px; }
  .phase-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: #f1f5f9; }
  .phase-prog { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
  .phase-prog-track { flex: 1; height: 3px; background: #1e2a3a; border-radius: 2px; overflow: hidden; }
  .phase-prog-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .phase-prog-pct { color: #475569; font-size: 11px; min-width: 30px; }
  .chevron { font-size: 18px; transition: transform 0.3s; flex-shrink: 0; }
  .open .chevron { transform: rotate(90deg); }

  .phase-body { border-top: 1px solid rgba(255,255,255,0.06); padding: 22px; display: none; }
  .phase-body.visible { display: block; animation: fadeIn 0.3s ease; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media(max-width:600px) { .grid2 { grid-template-columns: 1fr; } }

  .section-label { color: #64748b; font-size: 10px; letter-spacing: 2px; margin-bottom: 10px; }

  .topic-item, .task-item {
    display: flex; align-items: flex-start; gap: 9px;
    padding: 7px 9px; border-radius: 6px; margin-bottom: 4px;
    cursor: pointer; transition: background 0.15s;
  }
  .topic-item:hover { background: rgba(255,255,255,0.04); }
  .task-item { border: 1px solid rgba(255,255,255,0.04); }
  .task-item:hover { background: rgba(255,255,255,0.04); }
  .task-item.done { border-color: rgba(0,255,136,0.2); background: rgba(0,255,136,0.04); }

  .check-box {
    width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px;
    border: 1.5px solid #334155; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; background: transparent;
  }
  .check-circle {
    width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px;
    border: 1.5px solid #334155; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; background: transparent;
  }
  .check-box.checked, .check-circle.checked { color: #0a0e1a; }
  .check-icon { font-size: 9px; font-weight: 700; display: none; color: #0a0e1a; }
  .checked .check-icon { display: block; }

  .item-text { font-size: 12px; color: #cbd5e1; line-height: 1.5; transition: all 0.2s; }
  .item-text.done { color: #475569; text-decoration: line-through; }

  .resources { margin-top: 22px; }
  .res-links { display: flex; flex-wrap: wrap; gap: 8px; }
  .res-link {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 13px; border-radius: 8px;
    background: #111827; border: 1px solid rgba(255,255,255,0.07);
    color: #e2e8f0; font-size: 12px; font-family: 'JetBrains Mono', monospace;
    text-decoration: none; transition: filter 0.2s, border-color 0.2s;
  }
  .res-link:hover { filter: brightness(1.25); }
  .res-type {
    border-radius: 4px; padding: 1px 6px; font-size: 9px;
    font-weight: 600; letter-spacing: 0.5px; border: 1px solid;
  }
  .arrow { color: #334155; font-size: 11px; }

  .footer-tip {
    margin-top: 36px; padding: 18px 22px;
    border: 1px solid rgba(0,255,136,0.1);
    border-radius: 12px; background: #0d1220;
    display: flex; align-items: flex-start; gap: 14px;
  }
  .tip-icon { font-size: 26px; }
  .tip-title { color: #00ff88; font-size: 11px; font-weight: 600; margin-bottom: 5px; letter-spacing: 1px; }
  .tip-text { color: #64748b; font-size: 12px; line-height: 1.6; }
  .tip-text strong { color: #e2e8f0; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="header">
  <div style="max-width:900px;margin:0 auto">
    <div class="header-meta">
      <span class="label-green">DEVOPS/CLOUD</span>
      <span class="label-dim" style="margin:0 6px">•</span>
      <span class="label-dim">ROADMAP v1.0</span>
      <span class="cursor">_</span>
    </div>
    <h1>DevOps &amp; Cloud <span>с нуля</span></h1>
    <div class="progress-bar-wrap">
      <div class="progress-track"><div class="progress-fill" id="global-bar" style="width:0%"></div></div>
      <span class="progress-pct" id="global-pct">0%</span>
      <span class="progress-label">общий прогресс</span>
    </div>
  </div>
</div>

<div class="main" id="phases-container"></div>

<script>
const phases = [
  {
    icon:"🐧", color:"#00ff88", title:"Основы Linux & Командная строка", duration:"3–4 недели",
    topics:["Файловая система Linux (ls, cd, mkdir, rm, cp, mv)","Права доступа (chmod, chown, sudo)","Работа с текстом (cat, grep, sed, awk)","Процессы и ресурсы (ps, top, kill)","Bash-скрипты: переменные, условия, циклы","SSH: подключение к серверу"],
    tasks:["Установить Ubuntu в VirtualBox или WSL2","Написать bash-скрипт для бекапа папки","Настроить SSH-ключи и подключиться к серверу","Создать cron-задачу для автозапуска скрипта"],
    resources:[{n:"OverTheWire: Bandit",u:"https://overthewire.org/wargames/bandit/",t:"Практика"},{n:"Linux Journey",u:"https://linuxjourney.com/",t:"Теория"},{n:"HackerRank Linux Shell",u:"https://www.hackerrank.com/domains/shell",t:"Упражнения"},{n:"Explainshell.com",u:"https://explainshell.com/",t:"Справочник"}]
  },
  {
    icon:"🌐", color:"#00cfff", title:"Сети & Протоколы", duration:"2–3 недели",
    topics:["Модель OSI и TCP/IP","IP-адресация, маски подсетей, CIDR","DNS: как работает разрешение имён","HTTP/HTTPS: методы, коды статусов, заголовки","Firewall и базовая безопасность (iptables, ufw)","Инструменты: curl, wget, netstat, ping, traceroute"],
    tasks:["Настроить статический IP на Linux-машине","Поднять простой HTTP-сервер на Python","Исследовать DNS через dig и nslookup","Настроить базовые правила ufw"],
    resources:[{n:"Cisco Networking Basics",u:"https://www.coursera.org/learn/computer-networking",t:"Курс"},{n:"Subnetting Practice",u:"https://subnettingpractice.com/",t:"Практика"},{n:"HTTP cats",u:"https://http.cat/",t:"Справочник"},{n:"TryHackMe Pre-Security",u:"https://tryhackme.com/path/outline/presecurity",t:"Практика"}]
  },
  {
    icon:"🔀", color:"#ff6b35", title:"Git & Контроль версий", duration:"1–2 недели",
    topics:["Основы Git: init, add, commit, push, pull","Ветки: branch, merge, rebase","GitHub/GitLab: pull request, code review","Git Flow и стратегии ветвления",".gitignore и удалённые репозитории","Разрешение конфликтов"],
    tasks:["Создать репозиторий и опубликовать bash-скрипты","Сделать feature-ветку и создать PR","Сымитировать конфликт и разрешить его","Настроить Git aliases"],
    resources:[{n:"Learn Git Branching",u:"https://learngitbranching.js.org/",t:"Интерактив"},{n:"Oh My Git!",u:"https://ohmygit.org/",t:"Игра"},{n:"Git Katas",u:"https://github.com/eficode-academy/git-katas",t:"Упражнения"},{n:"Atlassian Git Tutorials",u:"https://www.atlassian.com/git/tutorials",t:"Теория"}]
  },
  {
    icon:"🐳", color:"#2496ed", title:"Docker & Контейнеризация", duration:"3–4 недели",
    topics:["Контейнеры vs виртуальные машины","Dockerfile: FROM, RUN, COPY, CMD, ENTRYPOINT","Docker-образы: build, push, pull","Docker Compose: многоконтейнерные приложения","Тома (volumes) и сети в Docker","Docker Hub и реестры образов"],
    tasks:["Запустить nginx в Docker-контейнере","Создать Dockerfile для приложения","Поднять стек app + БД через docker-compose","Оптимизировать образ с multi-stage builds"],
    resources:[{n:"Play with Docker",u:"https://labs.play-with-docker.com/",t:"Практика"},{n:"Docker Labs",u:"https://dockerlabs.collabnix.com/",t:"Упражнения"},{n:"KodeKloud Docker",u:"https://kodekloud.com/courses/docker-for-the-absolute-beginner/",t:"Курс"},{n:"Dive (анализ образов)",u:"https://github.com/wagoodman/dive",t:"Инструмент"}]
  },
  {
    icon:"⚙️", color:"#a855f7", title:"CI/CD Pipelines", duration:"2–3 недели",
    topics:["Концепция CI/CD: непрерывная интеграция и доставка","GitHub Actions: workflows, jobs, steps","GitLab CI/CD: .gitlab-ci.yml","Тестирование в pipeline (lint, unit tests)","Сборка и публикация Docker-образов в CI","Секреты и переменные среды в pipeline"],
    tasks:["Настроить GitHub Actions для автолинтинга","Создать pipeline: тест → сборка → push в Docker Hub","Добавить badge статуса в README","Настроить уведомления о падении pipeline"],
    resources:[{n:"GitHub Actions Docs",u:"https://docs.github.com/en/actions",t:"Документация"},{n:"Actions by Example",u:"https://www.actionsbyexample.com/",t:"Примеры"},{n:"KodeKloud GitHub Actions",u:"https://kodekloud.com/courses/github-actions/",t:"Курс"},{n:"GitLab CI/CD Tutorial",u:"https://www.freecodecamp.org/news/gitlab-ci-cd-tutorial/",t:"Туториал"}]
  },
  {
    icon:"☸️", color:"#326ce5", title:"Kubernetes (K8s)", duration:"4–6 недель",
    topics:["Архитектура K8s: Node, Pod, Cluster","Основные объекты: Pod, Deployment, Service","ConfigMap и Secrets","Ingress и балансировка нагрузки","Persistent Volumes и хранилище","Helm: менеджер пакетов для K8s"],
    tasks:["Развернуть кластер minikube локально","Задеплоить приложение с 3 репликами","Настроить rolling update без даунтайма","Установить приложение через Helm chart"],
    resources:[{n:"Kubernetes Interactive Tutorial",u:"https://kubernetes.io/docs/tutorials/",t:"Туториал"},{n:"KillerCoda K8s",u:"https://killercoda.com/playgrounds/scenario/kubernetes",t:"Практика"},{n:"KodeKloud CKA Course",u:"https://kodekloud.com/courses/certified-kubernetes-administrator-cka/",t:"Курс"},{n:"Killer.sh симулятор",u:"https://killer.sh/",t:"Экзамен"}]
  },
  {
    icon:"☁️", color:"#ff9900", title:"Cloud: AWS / GCP / Azure", duration:"4–6 недель",
    topics:["EC2/Compute, S3/Storage, RDS/Database","IAM: управление доступом и политики","VPC: виртуальные сети и подсети","Load Balancer и Auto Scaling","Serverless: Lambda/Cloud Functions","Infrastructure as Code: Terraform основы"],
    tasks:["Создать EC2-инстанс и задеплоить приложение","Настроить S3-бакет со статическим сайтом","Написать Terraform-конфиг для инфраструктуры","Пройти AWS Cloud Practitioner Practice Exam"],
    resources:[{n:"AWS Free Tier",u:"https://aws.amazon.com/free/",t:"Практика"},{n:"A Cloud Guru",u:"https://acloudguru.com/",t:"Курс"},{n:"AWS Skill Builder",u:"https://skillbuilder.aws/",t:"Официальный"},{n:"Terraform Learn",u:"https://developer.hashicorp.com/terraform/tutorials",t:"Туториал"}]
  },
  {
    icon:"📊", color:"#f59e0b", title:"Мониторинг & Observability", duration:"2–3 недели",
    topics:["Prometheus: метрики и alerting","Grafana: дашборды и визуализация","Loki: агрегация логов","Tracing: Jaeger / OpenTelemetry","SLI, SLO, SLA — определения и практика","Incident management и постмортемы"],
    tasks:["Поднять Prometheus + Grafana через docker-compose","Настроить алерт при CPU > 80%","Создать дашборд для мониторинга приложения","Написать runbook для типичного инцидента"],
    resources:[{n:"Prometheus Getting Started",u:"https://prometheus.io/docs/prometheus/latest/getting_started/",t:"Документация"},{n:"Grafana Play",u:"https://play.grafana.org/",t:"Песочница"},{n:"Google SRE Book (бесплатно)",u:"https://sre.google/sre-book/table-of-contents/",t:"Книга"},{n:"KodeKloud Prometheus",u:"https://kodekloud.com/courses/prometheus-certified-associate/",t:"Курс"}]
  }
];

const typeColors = {
  "Практика":"#00ff88","Теория":"#00cfff","Курс":"#a855f7","Упражнения":"#ff6b35",
  "Интерактив":"#f59e0b","Игра":"#ec4899","Справочник":"#94a3b8","Документация":"#64748b",
  "Туториал":"#22d3ee","Официальный":"#ff9900","Инструмент":"#84cc16","Книга":"#c084fc",
  "Экзамен":"#f87171","Песочница":"#34d399","Примеры":"#fb923c"
};

const state = { topics:{}, tasks:{} };

function hex2rgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function getProgress(pi){
  const p=phases[pi];
  const total=p.topics.length+p.tasks.length;
  const done=p.topics.filter((_,i)=>state.topics[`${pi}-${i}`]).length
            +p.tasks.filter((_,i)=>state.tasks[`${pi}-${i}`]).length;
  return total?Math.round(done/total*100):0;
}

function getTotalProgress(){
  let total=0,done=0;
  phases.forEach((p,pi)=>{
    total+=p.topics.length+p.tasks.length;
    done+=p.topics.filter((_,i)=>state.topics[`${pi}-${i}`]).length
         +p.tasks.filter((_,i)=>state.tasks[`${pi}-${i}`]).length;
  });
  return total?Math.round(done/total*100):0;
}

function updateGlobal(){
  const p=getTotalProgress();
  document.getElementById('global-bar').style.width=p+'%';
  document.getElementById('global-pct').textContent=p+'%';
}

function updatePhaseProgress(pi){
  const p=getProgress(pi);
  const fill=document.getElementById(`phase-prog-${pi}`);
  const pct=document.getElementById(`phase-pct-${pi}`);
  if(fill) fill.style.width=p+'%';
  if(pct) pct.textContent=p+'%';
  const done=document.getElementById(`phase-done-${pi}`);
  if(done) done.style.display=p===100?'inline':'none';
}

function render(){
  const container=document.getElementById('phases-container');
  let html='';
  phases.forEach((ph,pi)=>{
    const c=ph.color, rgb=hex2rgb(c);
    html+=`
    <div class="phase-card" id="card-${pi}">
      <div class="phase-header" onclick="toggle(${pi})">
        <div class="phase-icon" style="background:rgba(${rgb},0.1);border:1px solid rgba(${rgb},0.3)">${ph.icon}</div>
        <div class="phase-meta">
          <div class="phase-top">
            <span class="phase-num" style="color:${c}">ФАЗА ${pi+1}</span>
            <span class="phase-badge" style="color:${c};border-color:rgba(${rgb},0.3);background:rgba(${rgb},0.1)">${ph.duration}</span>
            <span class="done-label" id="phase-done-${pi}" style="display:none">✓ Завершено</span>
          </div>
          <div class="phase-title">${ph.title}</div>
          <div class="phase-prog">
            <div class="phase-prog-track">
              <div class="phase-prog-fill" id="phase-prog-${pi}" style="width:0%;background:linear-gradient(90deg,${c},${c}99)"></div>
            </div>
            <span class="phase-prog-pct" id="phase-pct-${pi}">0%</span>
          </div>
        </div>
        <span class="chevron" style="color:${c}">›</span>
      </div>
      <div class="phase-body" id="body-${pi}">
        <div class="grid2">
          <div>
            <div class="section-label">📚 ТЕМЫ ДЛЯ ИЗУЧЕНИЯ</div>
            ${ph.topics.map((t,ti)=>`
            <div class="topic-item" onclick="toggleTopic(${pi},${ti})">
              <div class="check-box" id="topicbox-${pi}-${ti}"><span class="check-icon">✓</span></div>
              <span class="item-text" id="topictext-${pi}-${ti}">${t}</span>
            </div>`).join('')}
          </div>
          <div>
            <div class="section-label">🛠️ ПРАКТИЧЕСКИЕ ЗАДАЧИ</div>
            ${ph.tasks.map((t,ti)=>`
            <div class="task-item" id="taskitem-${pi}-${ti}" onclick="toggleTask(${pi},${ti})">
              <div class="check-circle" id="taskbox-${pi}-${ti}"><span class="check-icon">✓</span></div>
              <span class="item-text" id="tasktext-${pi}-${ti}">${t}</span>
            </div>`).join('')}
          </div>
        </div>
        <div class="resources">
          <div class="section-label">🔗 РЕСУРСЫ ДЛЯ ПРОВЕРКИ ЗНАНИЙ</div>
          <div class="res-links">
            ${ph.resources.map(r=>{
              const tc=typeColors[r.t]||'#64748b';
              const trgb=hex2rgb(tc);
              return `<a class="res-link" href="${r.u}" target="_blank" rel="noopener">
                <span class="res-type" style="color:${tc};border-color:rgba(${trgb},0.4);background:rgba(${trgb},0.12)">${r.t}</span>
                ${r.n}<span class="arrow">↗</span>
              </a>`;
            }).join('')}
          </div>
        </div>
      </div>
    </div>`;
  });
  html+=`
  <div class="footer-tip">
    <div class="tip-icon">💡</div>
    <div>
      <div class="tip-title">СОВЕТ</div>
      <div class="tip-text">Кликайте по фазам, чтобы раскрыть темы и задачи. Отмечайте прогресс по мере обучения. Рекомендуемое время: <strong>6–10 месяцев</strong> при 1–2 часах в день.</div>
    </div>
  </div>`;
  container.innerHTML=html;
}

function toggle(pi){
  const card=document.getElementById(`card-${pi}`);
  const body=document.getElementById(`body-${pi}`);
  const isOpen=body.classList.contains('visible');
  // close all
  document.querySelectorAll('.phase-body').forEach(b=>b.classList.remove('visible'));
  document.querySelectorAll('.phase-card').forEach(c=>c.classList.remove('open'));
  if(!isOpen){
    body.classList.add('visible');
    card.classList.add('open');
    const color=phases[pi].color;
    card.style.borderColor=color+'44';
  } else {
    card.style.borderColor='rgba(255,255,255,0.07)';
  }
}

function toggleTopic(pi,ti){
  const key=`${pi}-${ti}`;
  state.topics[key]=!state.topics[key];
  const done=state.topics[key];
  const box=document.getElementById(`topicbox-${pi}-${ti}`);
  const txt=document.getElementById(`topictext-${pi}-${ti}`);
  const color=phases[pi].color;
  if(done){
    box.classList.add('checked');
    box.style.borderColor=color; box.style.background=color;
    txt.classList.add('done');
  } else {
    box.classList.remove('checked');
    box.style.borderColor='#334155'; box.style.background='transparent';
    txt.classList.remove('done');
  }
  updatePhaseProgress(pi); updateGlobal();
}

function toggleTask(pi,ti){
  const key=`${pi}-${ti}`;
  state.tasks[key]=!state.tasks[key];
  const done=state.tasks[key];
  const box=document.getElementById(`taskbox-${pi}-${ti}`);
  const txt=document.getElementById(`tasktext-${pi}-${ti}`);
  const item=document.getElementById(`taskitem-${pi}-${ti}`);
  const color=phases[pi].color;
  const rgb=hex2rgb(color);
  if(done){
    box.classList.add('checked');
    box.style.borderColor=color; box.style.background=color;
    txt.classList.add('done');
    item.classList.add('done');
    item.style.borderColor=`rgba(${rgb},0.25)`;
    item.style.background=`rgba(${rgb},0.06)`;
  } else {
    box.classList.remove('checked');
    box.style.borderColor='#334155'; box.style.background='transparent';
    txt.classList.remove('done');
    item.classList.remove('done');
    item.style.borderColor='rgba(255,255,255,0.04)';
    item.style.background='transparent';
  }
  updatePhaseProgress(pi); updateGlobal();
}

render();
</script>
</body>
</html>
